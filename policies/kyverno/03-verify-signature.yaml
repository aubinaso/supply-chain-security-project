# Politique 3 — Exiger une signature cosign VALIDE de VOTRE identité.
# C'est le contrôle central : le cluster n'exécute que des images signées par vous.
#
# Mode PAR CLÉ — collez votre cosign.pub (Lab 2)
# ➜ Adaptée pour johlan78
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Vérifier la signature cosign
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/description: >-
      Refuse toute image non signée ou signée par une identité non autorisée.
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verifier-signature-cosign
      match:
        any:
          - resources:
              kinds: [Pod]
      verifyImages:
        - imageReferences:
            - "ghcr.io/johlan78/scs-demo-app*"
          mutateDigest: true          # réécrit le tag en digest (empêche la substitution)
          verifyDigest: true
          required: true
          # ---- VARIANTE PAR CLÉ ----
          attestors:
            - count: 1
              entries:
                - keys:
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE6f2oWMWAxWIpA2xVNKH1YwETmKLw
                      Dek2mBPug4Nem/MnPr2ijuJIqRtzbirywHA+JuVW9WyvgDjBls625QBtSQ==
                      -----END PUBLIC KEY-----
