# Déploiement de l'app — Version locale pour démo Lab 3
# Utilise l'image du registry local avec digest
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scs-demo-app
  namespace: app
  labels: { app: scs-demo-app }
spec:
  replicas: 1
  selector:
    matchLabels: { app: scs-demo-app }
  template:
    metadata:
      labels: { app: scs-demo-app }
    spec:
      containers:
        - name: app
          # Image locale avec digest
          image: 172.17.0.1:5000/scs-demo-app:0.1.0@sha256:b506d38852c87a77b6701a5fb03e332dd47d9ccf3fbf82c176e781f09edf0854
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
          securityContext:
            runAsUser: 10001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: scs-demo-app
  namespace: app
spec:
  type: NodePort
  selector: { app: scs-demo-app }
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080     # mappé sur localhost:8080 par kind-config.yaml
