# Pipeline supply-chain de référence (Lab 5).
# build → SBOM → scan → push → sign (keyless) → attest (SBOM allégé + provenance).
# Signature KEYLESS : aucune clé stockée, l'identité est celle de CE workflow (OIDC).
#
# ⚠️ Deux contraintes alignées sur la voie locale (voir docs/04-depannage-local.md) :
#   §1 — cosign 2.x IMPÉRATIF : la 3.x écrit signatures/attestations via l'OCI referrers
#        API, que Kyverno 1.18 ne sait pas lire (« no signatures found »). On épingle 2.x.
#   §2 — on atteste un SBOM AU NIVEAU PAQUETS (< 2 Mio) : un SBOM complet dépasse la limite
#        de contexte codée en dur (2 Mio) de Kyverno et fait échouer require-provenance.
name: supply-chain

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write        # pousser sur GHCR
  id-token: write        # OIDC → signature keyless (Fulcio/Rekor)

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/scs-demo-app

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image (récupère le digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Référence par digest
        id: ref
        run: echo "ref=${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      # ---- SBOM ----
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Generate SBOM (SPDX)
        run: syft "${{ steps.ref.outputs.ref }}" -o spdx-json > sbom.spdx.json

      # ---- Scan : casse si CRITICAL corrigeable ----
      - name: Scan (Grype) — gate sur CRITICAL
        uses: anchore/scan-action@v4
        with:
          image: ${{ steps.ref.outputs.ref }}
          fail-build: true
          severity-cutoff: critical
          only-fixed: true

      # ---- cosign 2.x (voir en-tête §1) ----
      - name: Install cosign 2.x
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.6.3

      # ---- Signature keyless ----
      - name: Sign image (keyless)
        run: cosign sign --yes "${{ steps.ref.outputs.ref }}"

      # ---- SBOM allégé (< 2 Mio) pour l'attestation (voir en-tête §2) ----
      # Le SBOM complet reste l'artefact d'inspection ; on n'ATTESTE que la vue paquets.
      - name: SBOM allégé (retire la section files)
        run: |
          jq 'del(.files) | .relationships |= map(select(
            (.spdxElementId       | startswith("SPDXRef-File-") | not) and
            (.relatedSpdxElement  | startswith("SPDXRef-File-") | not)))' \
            sbom.spdx.json > sbom.att.spdx.json

      - name: Attest SBOM (allégé)
        run: |
          cosign attest --yes \
            --predicate sbom.att.spdx.json \
            --type spdxjson \
            "${{ steps.ref.outputs.ref }}"

      # ---- Attestation de provenance SLSA ----
      - name: Génère la provenance
        run: |
          cat > provenance.json <<EOF
          {
            "buildType": "https://github.com/actions/runner/v1",
            "builder": { "id": "${{ github.server_url }}/${{ github.repository }}/.github/workflows/supply-chain.yml@${{ github.ref }}" },
            "invocation": {
              "configSource": {
                "uri": "git+${{ github.server_url }}/${{ github.repository }}",
                "digest": { "sha1": "${{ github.sha }}" }
              }
            }
          }
          EOF
      - name: Attest provenance (SLSA)
        run: |
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            "${{ steps.ref.outputs.ref }}"

      - name: Récapitulatif
        run: |
          echo "### Image signée & attestée :computer:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.ref.outputs.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Rendre le package **public** une fois (Settings → Danger Zone) pour que le" >> "$GITHUB_STEP_SUMMARY"
          echo "cluster puisse lire l'image et ses artefacts cosign. Voir docs/04 §4." >> "$GITHUB_STEP_SUMMARY"

# NB : pour une provenance SLSA "officielle" (niveau supérieur), voir le générateur
#      slsa-framework/slsa-github-generator (job séparé). Le bloc ci-dessus est volontairement
#      simple à des fins pédagogiques.
